                        dotColor: "bg-outline"
                    },
                    {
                        title: "성경에서 무엇을 배울 수 있습니까?",
                        category: "서적",
                        image: "https://lh3.googleusercontent.com/aida-public/AB6AXuCx9d9u4NFgpQ5LP7XF6wkJmZFTKY8wYIUo7_6veSezHs3Z9j73i1bHH-G_QC8FLGLQs-nXen77O4SMauxaM0hEImFoObOr6rwuT-9qrmZv4UYnjj0jEikpU4wSQ_HkUrNhSXzLlu_Z-P2WqJmrzp1V8MFE1cjSIhuGEHwG9odmku-71JKNecU5i14SGEThremcqANNynAqx41e4CPC26HaecVDCLqUuaJ8ghPkLHZmERue7pggPvhvxhVsRG7VkBmRZo8wRfXW-v4",
                        statusText: "여유 있음",
                        statusColor: "bg-tertiary-fixed text-on-tertiary-fixed",
                        dotColor: "bg-tertiary-fixed-dim"
                    }
                ]);

                const radius = computed(() => {
                    // Increased radius for clearer circular structure (approx 420px for desktop)
                    const isMobile = window.innerWidth < 768;
                    const baseRadius = isMobile ? 320 : 420;
                    return baseRadius;
                });

                const stepAngle = computed(() => 360 / carouselItems.value.length);

                function getCardStyle(index) {
                    const angle = stepAngle.value * index;
                    // Opacity and blur logic based on rotation
                    const cardRotation = (angle + rotation.value) % 360;
                    const normalizedRotation = (cardRotation + 360) % 360;
                    
                    // Frontend logic: item is front if normalizedRotation is near 0 or 360
                    const diffToFront = Math.min(normalizedRotation, 360 - normalizedRotation);
                    
                    // Depth-based opacity: farther cards are more transparent (0.3 to 1.0)
                    const opacity = Math.max(0.2, 1 - (diffToFront / 180));
                    const blur = Math.min(6, diffToFront / 25);
                    const scale = 1 - (diffToFront / 500); // Subtle scale based on distance
                    
                    return {
                        transform: `rotateY(${angle}deg) translateZ(${radius.value}px) scale(${scale})`,
                        opacity: opacity,
                        filter: `blur(${blur}px)`
                    };
                }

                function isActive(index) {
                    const angle = stepAngle.value * index;
                    const currentRingRot = (rotation.value % 360 + 360) % 360;
                    const targetRingRot = (360 - angle) % 360;
                    const diff = Math.abs(currentRingRot - targetRingRot);
                    return diff < 10 || diff > 350;
                }

                function rotateBy(direction) {
                    rotation.value += direction * stepAngle.value;
                }

                function startDrag(e) {
                    isDragging.value = true;
                    startX.value = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    currentX.value = startX.value;
                }

                function onDrag(e) {
                    if (!isDragging.value) return;
                    const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const delta = x - currentX.value;
                    rotation.value += delta * 0.4; // Sensitivity adjusted
                    currentX.value = x;
                }

                function endDrag() {
                    if (!isDragging.value) return;
                    isDragging.value = false;
                    // Snap to closest angle
                    const closest = Math.round(rotation.value / stepAngle.value) * stepAngle.value;
                    rotation.value = closest;
                }

                return {
                    rotation,
                    carouselItems,
                    radius,
                    stepAngle,
                    getCardStyle,
                    isActive,
                    rotateBy,
                    startDrag,
                    onDrag,
                    endDrag
                };
            }
        }).mount('#app');
    </script>
</body></html>
