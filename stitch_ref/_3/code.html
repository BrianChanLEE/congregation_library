<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Noto+Sans:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>

      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .landing-gradient {
      background: radial-gradient(circle at top right, rgba(209, 228, 251, 0.3) 0%, transparent 70%),
                  radial-gradient(circle at bottom left, rgba(119, 194, 255, 0.1) 0%, transparent 50%);
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-primary-fixed": "#091d2e",
                  "on-error": "#ffffff",
                  "on-tertiary-fixed": "#00210c",
                  "surface-container-lowest": "#ffffff",
                  "surface-bright": "#f8f9fa",
                  "secondary-fixed": "#cce5ff",
                  "inverse-surface": "#2e3132",
                  "surface": "#f8f9fa",
                  "on-secondary": "#ffffff",
                  "on-primary-container": "#96a9be",
                  "secondary-container": "#77c2ff",
                  "on-error-container": "#93000a",
                  "tertiary-fixed": "#7efba4",
                  "tertiary-container": "#004721",
                  "error": "#ba1a1a",
                  "surface-dim": "#d9dadb",
                  "on-primary-fixed-variant": "#36485b",
                  "tertiary": "#002e14",
                  "on-tertiary-container": "#3cbe6e",
                  "on-secondary-fixed-variant": "#004b73",
                  "primary-fixed-dim": "#b5c8df",
                  "inverse-primary": "#b5c8df",
                  "primary-fixed": "#d1e4fb",
                  "surface-container": "#edeeef",
                  "background": "#f8f9fa",
                  "error-container": "#ffdad6",
                  "secondary-fixed-dim": "#92ccff",
                  "tertiary-fixed-dim": "#61de8a",
                  "on-tertiary": "#ffffff",
                  "on-surface": "#191c1d",
                  "on-primary": "#ffffff",
                  "outline": "#74777d",
                  "primary": "#162839",
                  "surface-tint": "#4e6073",
                  "on-background": "#191c1d",
                  "secondary": "#006497",
                  "surface-variant": "#e1e3e4",
                  "on-tertiary-fixed-variant": "#005228",
                  "surface-container-low": "#f3f4f5",
                  "inverse-on-surface": "#f0f1f2",
                  "surface-container-highest": "#e1e3e4",
                  "on-surface-variant": "#43474c",
                  "on-secondary-fixed": "#001e31",
                  "primary-container": "#2c3e50",
                  "surface-container-high": "#e7e8e9",
                  "on-secondary-container": "#004f79",
                  "outline-variant": "#c4c6cd"
          },
          "borderRadius": {
                  "DEFAULT": "0.125rem",
                  "lg": "0.25rem",
                  "xl": "0.5rem",
                  "full": "0.75rem"
          },
          "spacing": {
                  "md": "16px",
                  "container-max": "1200px",
                  "base": "4px",
                  "sm": "8px",
                  "gutter": "16px",
                  "xs": "4px",
                  "lg": "24px",
                  "xl": "40px"
          },
          "fontFamily": {
                  "headline-sm": ["Hanken Grotesk"],
                  "body-sm": ["Noto Sans"],
                  "headline-md": ["Hanken Grotesk"],
                  "headline-lg-mobile": ["Hanken Grotesk"],
                  "body-lg": ["Noto Sans"],
                  "headline-lg": ["Hanken Grotesk"],
                  "body-md": ["Noto Sans"],
                  "label-md": ["Noto Sans"]
          },
          "fontSize": {

                  "body-sm": ["13px", {"lineHeight": "1.5", "fontWeight": "400"}],

                  "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                  "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600"}]
          }
        },
      },
    }

</head>
<body class="bg-background text-on-background font-body-md text-body-md overflow-hidden">
<!-- Landing Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-between landing-gradient">
<!-- Top Content / Empty for spacing in Landing Screen -->
<div class="h-16 w-full"></div>
<!-- Central Branding Section -->
<section class="flex flex-col items-center px-md text-center max-w-lg">
<!-- Logo Component (KH Library Identity) -->
<div class="mb-lg animate-fade-in">
<div class="w-20 h-20 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-sm">
<span class="material-symbols-outlined text-surface text-[48px]" style="font-variation-settings: 'FILL' 1;">local_library</span>
</div>
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight">
          KH Library
        </h1>
<p class="mt-sm font-body-lg text-body-lg text-on-surface-variant max-w-xs mx-auto">
          회중의 지식을 체계적으로 관리하고 <br/> 필요한 정보를 손쉽게 찾아보세요.
        </p>
</div>
<!-- Hero Visual (Abstract) -->
<div class="relative w-full h-48 md:h-64 rounded-xl overflow-hidden mb-lg border border-outline-variant bg-surface-container-low group">
<img alt="System Visual" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-700" data-alt="A serene and highly minimalist library interior with clean white architectural lines and soft natural daylight. The image follows a light-mode aesthetic with a palette of deep navy blues and crisp whites. In the foreground, an abstract digital interface glow represents the KH Library system. The atmosphere is professional, quiet, and deeply organized, reflecting a sense of trust and focused knowledge management." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQcLx6mm9H9vLBJxD5DwEaOTLJ-ihPBHyTZCvMsLgQZDEvU1gx5efdPVxbhc0drku_x2OEqTNTV4ApqnZA10E4ELgzNtyndx8loLHt4778IhGsbLj-9sHBM0AT0HTOOuGOjtvC5Q_I8ZHn0it2sVA6Rmnr65x6HpBLfoVF1xTZdxD2eFwLXaTrTVUAZL1Bs4y4IKj_sZLZMwi6-7nB4VbnPtU9KixhFbuQKCIKDWI91hEmIkvuK4Iyl192gsQwff-rReg2Gx0DCmc"/>
<div class="absolute inset-0 bg-gradient-to-t from-background/40 to-transparent"></div>
</div>
</section>
<!-- Bottom Action Section -->
<section class="w-full max-w-md px-md pb-xl flex flex-col gap-md">
<!-- Primary Action: Login -->
<button class="w-full h-14 bg-primary text-surface font-headline-sm text-headline-sm rounded-lg flex items-center justify-center gap-sm active:scale-[0.98] transition-all hover:bg-primary-container hover:shadow-lg" onclick="window.location.href='#login'">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">login</span>
        로그인하여 시작하기
      </button>
<!-- Secondary Links -->
<div class="flex items-center justify-center gap-lg">
<a class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors" href="#">
          계정 찾기
        </a>
<div class="w-[1px] h-3 bg-outline-variant"></div>
<a class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors" href="#">
          시스템 도움말
        </a>
</div>
<!-- Footer Identity -->
<p class="mt-md text-center text-on-surface-variant font-label-md text-label-md opacity-60">
        © 2024 KH Library Inventory System. <br/> All rights reserved.
      </p>
</section>
</main>
<!-- Optional Micro-interaction Script -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
      // Simple fade-in animation for the landing elements
      const main = document.querySelector('main');
      main.style.opacity = '0';
      main.style.transition = 'opacity 0.8s ease-out';
      
      requestAnimationFrame(() => {
        main.style.opacity = '1';
      });

      // Interactive hover effect for the CTA
      const cta = document.querySelector('button');
      cta.addEventListener('mouseenter', () => {
        cta.style.transform = 'translateY(-2px)';
      });
      cta.addEventListener('mouseleave', () => {
        cta.style.transform = 'translateY(0)';
      });
    });
  </script>
</body></html>
