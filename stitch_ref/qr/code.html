<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-overlay {
            background: rgba(0, 0, 0, 0.7);
            clip-path: polygon(0% 0%, 0% 100%, 50% 100%, 50% 70%, 15% 70%, 15% 30%, 85% 30%, 85% 70%, 50% 70%, 50% 100%, 100% 100%, 100% 0%);
        }
        @keyframes scan-line {
            0% { top: 30%; }
            100% { top: 70%; }
        }
        .animate-scan {
            animation: scan-line 2.5s linear infinite;
        }
        .qr-corner {
            width: 32px;
            height: 32px;
            border-color: #77c2ff;
        }

<body class="bg-surface text-on-surface font-body-md overflow-hidden">
<!-- Top Navigation Bar (Mobile Focused) -->
<header class="fixed top-0 left-0 w-full z-50 bg-primary-container text-white px-md h-16 flex items-center justify-between border-b border-white/10 shadow-lg">
<div class="flex items-center gap-md">
<button class="p-sm hover:bg-white/10 rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined text-white">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold tracking-tight">QR 스캔</h1>
</div>
<div class="flex items-center gap-sm">
<button class="p-sm hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined">flash_on</span>
</button>
<button class="p-sm hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Scanner Content -->
<main class="relative h-screen w-full flex flex-col items-center justify-center pt-16">
<!-- Camera Live Feed Simulation -->
<div class="absolute inset-0 z-0">

</div>
<!-- Dark Overlay with Hole -->
<div class="absolute inset-0 z-10 bg-black/60 pointer-events-none">
<!-- Center Hole Simulation through clipping/flex -->
<div class="w-full h-full flex items-center justify-center">
<div class="relative w-64 h-64 md:w-80 md:h-80">
<!-- Laser Line -->
<div class="absolute left-0 w-full h-[2px] bg-secondary-container/80 shadow-[0_0_15px_rgba(119,194,255,1)] z-20 animate-scan"></div>
<!-- Corners -->
<div class="absolute top-0 left-0 qr-corner border-t-4 border-l-4 rounded-tl-lg"></div>
<div class="absolute top-0 right-0 qr-corner border-t-4 border-r-4 rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 qr-corner border-b-4 border-l-4 rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 qr-corner border-b-4 border-r-4 rounded-br-lg"></div>
</div>
</div>
</div>
<!-- Instructions & Actions -->

<div class="mb-xl bg-black/40 backdrop-blur-md border border-white/20 p-md rounded-xl text-white">

<!-- Micro-interaction Scripts -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Flash toggle effect
            const flashBtn = document.querySelector('button span:contains("flash_on")')?.parentElement;
            if (flashBtn) {
                flashBtn.addEventListener('click', () => {
                    const icon = flashBtn.querySelector('span');
                    if (icon.innerText === 'flash_on') {
                        icon.innerText = 'flash_off';
                        flashBtn.classList.add('bg-white/30');
                    } else {
                        icon.innerText = 'flash_on';
                        flashBtn.classList.remove('bg-white/30');
                    }
                });
            }

            // Simple scale on touch
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('touchstart', () => {
                    btn.classList.add('scale-95');
                });
                btn.addEventListener('touchend', () => {
                    btn.classList.remove('scale-95');
                });
            });
        });
    </script>
</body></html>
